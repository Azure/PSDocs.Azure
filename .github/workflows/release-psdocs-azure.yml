name: Release PSDocs.Azure

on:
  push:
    tags:
      - 'psdocs-azure-v*'

jobs:
  release:
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      
      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: '8.0.x'
      
      - name: Setup PowerShell modules
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module -Name InvokeBuild -MinimumVersion 5.4.0 -Scope CurrentUser -Force

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/psdocs-azure-v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      
      - name: Build
        shell: pwsh
        working-directory: packages/psdocs-azure
        run: |
          Invoke-Build Build -File ./pipeline.build.ps1
      
      - name: Publish to PSGallery
        shell: pwsh
        env:
          PSGALLERY_API_KEY: ${{ secrets.PSGALLERY_API_KEY }}
        run: |
          Publish-Module -Path packages/psdocs-azure/out/modules/PSDocs.Azure -NuGetApiKey $env:PSGALLERY_API_KEY
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda # v2.2.1
        with:
          name: PSDocs.Azure v${{ steps.version.outputs.version }}
          body_path: packages/psdocs-azure/CHANGELOG.md
          generate_release_notes: true
